<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care Journey | Dr. Toor</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="minimal-dark scroll-enabled">

    <!-- <img src="../assets/new.png" alt="" class="bison-watermark" aria-hidden="true"> -->

    <a href="../index.html" class="minimal-back-btn">
        <i class="fa-solid fa-arrow-left-long"></i> Back
    </a>

    <div class="hub-wrapper" style="max-width: 1000px; padding-top: 15vh; min-height: 100vh; justify-content: flex-start;">
        <header class="hub-header">
            <h1>CARE <span>JOURNEY</span></h1>
            <div class="accent-line"></div>
            <p class="hub-subtitle">Please select your current phase of care to ensure we route you to the correct resources.</p>
        </header>

        <div class="persona-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));">
            
            <a href="new-patient.html" class="persona-card">
                <i class="fa-regular fa-calendar-plus"></i>
                <h3>New Patient</h3>
                <p class="status-sub">I have not seen Dr. Toor</p>
            </a>
            
            <a href="pre-op.html" class="persona-card">
                <i class="fa-regular fa-clock"></i>
                <h3>Pre-Op</h3>
                <p class="status-sub">I am waiting for surgery</p>
            </a>

            <a href="portal.html" class="persona-card">
                <i class="fa-solid fa-bed-pulse"></i>
                <h3>Post-Op</h3>
                <p class="status-sub">I have had a surgery</p>
            </a>

        </div>
    </div>

</body>
</html>
